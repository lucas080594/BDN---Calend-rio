<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escala de Áudio - Bola de Neve Sorocaba</title>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div>
        <h1>MINISTÉRIO DE ÁUDIO</h1>
        <p>BOLA DE NEVE SOROCABA</p>
      </div>
    </div>
    <div class="painel-ativo">PAINEL DE CONTROLE ATIVO</div>
  </header>

  <!-- CONTAINER PRINCIPAL -->
  <div class="container">
    <!-- CONTEÚDO PRINCIPAL -->
    <div class="main-content">
      <!-- CALENDÁRIO (FullCalendar) -->
      <div class="calendar-wrapper">
        <div id="calendar"></div>
      </div>

      <!-- PARTICIPAÇÕES NO MÊS -->
      <div class="statistics">
        <h3>📊 Participações no Mês</h3>
        <div id="listaStats" class="stats-grid">
          <!-- Preenchido por JavaScript -->
        </div>
      </div>
    </div>

    <!-- SIDEBAR DIREITA -->
    <div class="sidebar">
      <!-- PRÓXIMAS ESCALAS -->
      <div class="next-scales">
        <h3>📅 Próximas Escalas</h3>
        <div class="next-scales-list" id="nextScalesList">
          <!-- Preenchido por JavaScript -->
        </div>
      </div>

      <!-- AGENDA CULTO -->
      <div class="agenda-culto">
        <h3>➕ Agendar Culto</h3>
        <form id="agendaForm">
          <div class="form-group">
            <label for="agendaData">Data</label>
            <input type="date" id="agendaData" required>
          </div>

          <div class="form-group">
            <label for="agendaTipo">Tipo</label>
            <select id="agendaTipo" required>
              <option value="">Selecionar...</option>
              <option value="Domingo Noite">Domingo Noite</option>
              <option value="Domingo Manhã">Domingo Manhã</option>
              <option value="Extra">Extra</option>
            </select>
          </div>

          <div class="form-group">
            <label for="agendaMembro">Membro</label>
            <select id="agendaMembro" required>
              <option value="">Selecionar Membro...</option>
              <!-- Preenchido por JavaScript -->
            </select>
          </div>

          <button type="submit" class="btn-salvar">Salvar Escala</button>
        </form>
      </div>

      <!-- EQUIPE -->
      <div class="team">
        <h3>👥 Equipe</h3>
        <div class="team-form">
          <input type="text" id="teamName" placeholder="Adicionar membro...">
          <button type="button" class="btn-add-member" onclick="addTeamMember()">ADD</button>
        </div>
        <ul class="team-list" id="teamList">
          <!-- Preenchido por JavaScript -->
        </ul>
      </div>
    </div>
  </div>

  <!-- MODAL DE EDIÇÃO -->
  <div id="modalEditar" class="modal-hidden">
    <div class="modal-content">
      <h2>Alterar Responsável</h2>
      <input type="hidden" id="editEscalaId">
      <div class="form-group">
        <label>Selecione o Integrante:</label>
        <select id="editSelectMembro"></select>
      </div>
      <div class="modal-buttons">
        <button onclick="fecharModal()" class="btn-cancelar">Cancelar</button>
        <button id="btnSalvarEdicao" class="btn-salvar-modal">Salvar</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
